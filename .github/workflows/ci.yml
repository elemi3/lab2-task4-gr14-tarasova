name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up GCC
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Clean
      run: make clean

    - name: Build
      run: make

    - name: Check executable
      run: file ./program

    - name: Make executable
      run: chmod +x ./program

    - name: Run
      run: ./program